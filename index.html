<body>

<div class="app-container">
    
    <div id="start-screen" class="screen active">

    </div>

    <div id="result-screen" class="screen">

        </div>

    let currentQuestions = [];

    function startTest() {
        const ageSelect = document.getElementById("age-group");
        currentAgeGroup = ageSelect.value;
        currentQuestions = questionsDB[currentAgeGroup];
        currentQuestionIndex = 0;
        
        // 점수 초기화
        scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
        
        document.getElementById("start-screen").classList.remove("active");
        document.getElementById("question-screen").classList.add("active");
        
        renderQuestion();
    }

    function renderQuestion() {
        if (currentQuestionIndex >= currentQuestions.length) {
            calculateResult();
            return;
        }
        document.getElementById("question-number").innerText = `Q ${currentQuestionIndex + 1} / ${currentQuestions.length}`;
        document.getElementById("question-text").innerText = currentQuestions[currentQuestionIndex].text;
    }

    function nextQuestion(score) {
        const qType = currentQuestions[currentQuestionIndex].type;
        
        if (qType === "EI") { score >= 3 ? scores.E += score : scores.I += (5 - score); }
        if (qType === "SN") { score >= 3 ? scores.S += score : scores.N += (5 - score); }
        if (qType === "TF") { score >= 3 ? scores.T += score : scores.F += (5 - score); }
        if (qType === "JP") { score >= 3 ? scores.J += score : scores.P += (5 - score); }

        currentQuestionIndex++;
        renderQuestion();
    }

    function calculateResult() {
        document.getElementById("question-screen").classList.remove("active");
        document.getElementById("result-screen").classList.add("active");

        // 최종 MBTI 도출
        const mbti = [
            scores.E >= scores.I ? "E" : "I",
            scores.S >= scores.N ? "S" : "N",
            scores.T >= scores.F ? "T" : "F",
            scores.J >= scores.P ? "J" : "P"
        ].join("");

        // 결과 화면에 데이터 렌더링
        const resultData = mbtiResultData[mbti];
        
        document.getElementById("mbti-result").innerText = mbti;
        document.getElementById("result-image").src = resultData.image; // 연예인 이미지 삽입
        document.getElementById("mbti-idol").innerText = "찰떡 연예인: " + resultData.idol;
        
        const groupName = currentAgeGroup === 'student' ? '학생' : (currentAgeGroup === 'worker' ? '직장인' : '노인');
        document.getElementById("mbti-desc").innerHTML = `<b>[${groupName} 특화 분석]</b><br>${resultData.desc}`;

        // 퍼센트 바 애니메이션
        setTimeout(() => {
            setBar("E", "I", scores.E, scores.I);
            setBar("S", "N", scores.S, scores.N);
            setBar("T", "F", scores.T, scores.F);
            setBar("J", "P", scores.J, scores.P);
        }, 100);
    }

    function setBar(leftType, rightType, leftScore, rightScore) {
        const total = leftScore + rightScore || 1;
        const leftPercent = Math.round((leftScore / total) * 100);
        const rightPercent = 100 - leftPercent;

        const leftBar = document.getElementById(`bar-${leftType.toLowerCase()}`);
        const rightBar = document.getElementById(`bar-${rightType.toLowerCase()}`);

        leftBar.style.width = `${leftPercent}%`;
        leftBar.innerText = leftPercent > 10 ? `${leftType} ${leftPercent}%` : leftType;
        
        rightBar.style.width = `${rightPercent}%`;
        rightBar.innerText = rightPercent > 10 ? `${rightPercent}% ${rightType}` : rightType;
    }
</script>
